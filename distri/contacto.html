<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Sabor & Co.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menú</a>

                    </li>
                </ul>
            </div>

<div class="container mt-4">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Inicio</a></li>
            <li class="breadcrumb-item active">Contacto</li>
        </ol>
    </nav>

    <h1>Contacto</h1>
    <p>¿Tienes alguna consulta o quieres hacer un pedido especial? Escríbenos.</p>

    <form class="mt-4">

        <!-- Nombre -->
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre completo</label>
            <input type="text" class="form-control" id="nombre" placeholder="Tu nombre">
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="email" placeholder="tucorreo@email.com">
        </div>

        <!-- Lista seleccionable -->
        <div class="mb-3">
            <label for="asunto" class="form-label">¿En qué podemos ayudarte?</label>
            <select class="form-select" id="asunto">
                <option value="">Selecciona una opción</option>
                <option value="reserva">Hacer una reserva</option>
                <option value="pedido">Pedido especial</option>
                <option value="reclamo">Reclamo o sugerencia</option>
                <option value="otro">Otro</option>
            </select>
        </div>

        <!-- Textarea -->
        <div class="mb-3">
            <label for="mensaje" class="form-label">Mensaje</label>
            <textarea class="form-control" id="mensaje" rows="4" placeholder="Escribe tu mensaje aquí..."></textarea>
        </div>

        <!-- Checkbox -->
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="suscribir">
            <label class="form-check-label" for="suscribir">
                Quiero suscribirme para recibir ofertas y novedades
            </label>
        </div>

        <button type="submit" class="btn btn-primary">Enviar mensaje</button>

    </form>
</div>

    <script src="node_modules/jquery/dist/jquery.min.js"></script>
    <script src="node_modules/popper.js/dist/umd/popper.min.js"></script>
    <script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
</body>
</html>
